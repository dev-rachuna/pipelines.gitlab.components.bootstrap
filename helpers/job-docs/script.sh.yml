---
.helpers.job-docs.script.sh:
  - |
    h3 "job-docs/script.sh.yml"

# Wyświetla baner z odnośnikiem do dokumentacji projektu,
# dobierając kolor na podstawie statusu joba.
#
# usage:
#   job_docs
#
# example:
#   job_docs
#
# outputs:
#   Baner z adresem dokumentacji na standardowym wyjściu
  - |
    job_docs(){
      [[ ! -v DOCS_MD_FILE_PATH ]] && critical "🫵 Komunikat dla DevOps! Nie ustawiono wartości dla zmiennej 'DOCS_MD_FILE_PATH'"
      [[ ! -f "$DOCS_MD_FILE_PATH" && "${PROJECT_TYPE:-default}" == "gitlab-pipelines" ]] && critical "🫵 Komunikat dla DevOps! Plik dokumentacji '$DOCS_MD_FILE_PATH' nie istnieje"

      msg="🫵 Jeśli masz problem, najpierw zapoznaj się z dokumentacją \n"
      msg+="    Dokumentacja: $CI_SERVER_URL/${GITLAB_CI_COMPONENTS_PATH:-$GITLAB_CI_REPOSITORY_PATH}/-/blob/${GITLAB_CI_COMPONENTS_VERSION:-$GITLAB_CI_REPOSITORY_BRANCH}/$DOCS_MD_FILE_PATH"

      if [ "$CI_JOB_STATUS" == 'success' ]; then
        banner green "$msg"
      else
        banner red "$msg"
      fi
    }

  - |
    job_docs
