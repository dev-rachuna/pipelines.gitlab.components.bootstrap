---
.helpers.job-prepare.script.sh:
  - |
    set -eaou pipefail
  - |
    prepare_job() {
      h3 "common/helpers/job-prepare/script.sh.yml"

      CONFIG="${CI_CONFIG_PATH#*@}"

      export GITLAB_CI_REPOSITORY_FILEPATH="${CI_CONFIG_PATH%%@*}"
      export GITLAB_CI_REPOSITORY_PATH="${CONFIG%%:*}"
      export GITLAB_CI_REPOSITORY_BRANCH="${CONFIG#*:}"
      export GITLAB_CI_REPOSITORY_PATH_ENCODED="${GITLAB_CI_REPOSITORY_PATH//\//%2F}"
      export GITLAB_CI_REPOSITORY_ID="83078303"
    }
    prepare_job
  - |
    check_var() {
      if [[ ! -v "$1" ]]; then
        echo "❌ Zmienna '$1' nie jest zdefiniowana!"
        exit 1
      fi
    }
