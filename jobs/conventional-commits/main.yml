---
include:
  - jobs/jobs/conventional-commits/script.sh.yml

.job.conventional-commits.before_script.sh:
  - ":"

.job.conventional-commits.validate.sh:
  - check_var "CONVENTIONAL_COMMITS_REGEXP"

.job.conventional-commits.after_script.sh:
  - ":"

.job.conventional-commits:
  image: !reference [.common.images, conventional-commits]
  stage: !reference [.common.stages, conventional-commits]
  variables: !reference [.common.variables, conventional-commits]
  rules: !reference [.common.rules, conventional-commits]
  needs: !reference [.common.needs, conventional-commits]
  artifacts: !reference [.common.artifacts, conventional-commits]
  cache: !reference [.common.cache, conventional-commits]
  resource_group: !reference [.common.resource_group, conventional-commits]
  before_script:
    - !reference [.common.helpers.logger.script.sh]
    - !reference [.common.helpers.job-prepare.script.sh]
    - !reference [.common.helpers.logo.script.sh]
    - !reference [.common.helpers.gitlab-tools.script.sh]
    - !reference [.common.conventional-commits.before_script.sh]
    - !reference [.common.conventional-commits.validate.sh]
  script:
    - !reference [.common.conventional-commits.script.sh]
  after_script:
    - !reference [.common.helpers.logger.script.sh]
    - !reference [.common.helpers.job-prepare.script.sh]
    - !reference [.common.helpers.job-docs.script.sh]
    - !reference [.common.conventional-commits.after_script.sh]
