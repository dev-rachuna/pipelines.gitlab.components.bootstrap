---
spec:
  description: "Bazowa konfiguracja joba dla pipeline GitLab CI/CD."
  inputs:
    image:
      description: "Obraz bazowy kontenera"
      default: "registry.gitlab.com/dev.rachuna/artifacts/containers/python:1.2.0"
    before_script:
      description: "Polecenia wykonywane przed skryptem joba konsumenta."
      type: array
      default: []
---
include:
  - local: helpers/*/script.sh.yml

.before_script:
  image: $[[ inputs.image ]]
  before_script: 
    - !reference [.helpers.logger.script.sh]
    - !reference [.helpers.job-prepare.script.sh]
    - !reference [.helpers.logo.script.sh]
    - !reference [.helpers.gitlab-tools.script.sh]
    - $[[ inputs.before_script ]]
    - |
      if [ -n "${CI_JOB_BEFORE_SCRIPT:-}" ]; then
        eval "$CI_JOB_BEFORE_SCRIPT"
      fi
