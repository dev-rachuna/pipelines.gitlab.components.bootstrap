---
spec:
  description: "Generuje plik konfiguracji GitLab CI z jobem wdrożeniowym dla każdego aktywnego środowiska projektu."
  component: [name, version, reference]
  inputs:
    job-name:
      type: string
      default: dynamic-deployment-environment
      description: "Nazwa joba generującego dynamiczną konfigurację wdrożeń."
    trigger-job-name:
      type: string
      default: trigger-deployment
      description: "Nazwa joba uruchamiającego wygenerowany child pipeline."
    job-stage:
      default: .pre
      description: "Etap pipeline, na którym zostanie uruchomiony job."
      options: [".pre", "prepare", "dependency", "validate", "build", "deployment", "tests", "publish", ".post"]
    trigger-job-stage:
      default: deployment
      description: "Etap pipeline, na którym zostanie uruchomiony job wyzwalający."
      options: [".pre", "prepare", "dependency", "validate", "build", "deployment", "tests", "publish", ".post"]
    job-image:
      description: "Obraz kontenera używany do uruchomienia joba."
      type: string
      default: registry.gitlab.com/pl.rachuna-net/artifacts/containers/python:v1.2.0
    job-rules:
      description: "Reguły określające, kiedy job zostanie dodany do pipeline."
      type: array
      default:
        - if: '$PIPELINE_TYPE == "CI"'
          when: never
        - if: '$PIPELINE_TYPE == "CD" && $CI_PIPELINE_SOURCE != "parent_pipeline"'
          when: on_success
        - when: never
    trigger-job-rules:
      description: "Reguły określające, kiedy job wyzwalający zostanie dodany do pipeline."
      type: array
      default:
        - if: '$PIPELINE_TYPE == "CI"'
          when: never
        - if: '$PIPELINE_TYPE == "CD" && $CI_PIPELINE_SOURCE != "parent_pipeline"'
          when: on_success
        - when: never
    job-needs:
      description: "Lista jobów wymaganych przed uruchomieniem tego joba."
      type: array
      default: []
    job-resource-group:
      description: "Nazwa grupy zasobów ograniczającej równoległe wykonywanie joba."
      type: string
      default: "${CI_PIPELINE_ID}-${CI_JOB_NAME}"
    trigger-job-resource-group:
      description: "Nazwa grupy zasobów ograniczającej równoległe uruchamianie child pipeline."
      type: string
      default: "${CI_PIPELINE_ID}-${CI_JOB_NAME}"
    job-before-script:
      description: "Dodatkowy skrypt wykonywany przed pobraniem listy środowisk."
      type: string
      default: ":"
    job-after-script:
      description: "Dodatkowy skrypt wykonywany po wygenerowaniu konfiguracji wdrożeń."
      type: string
      default: ":"
    job-definitons-script:
      description: "Definicja dynamicznego joba wdrożeniowego. Dostępna zmienna: ${ENV_NAME}."
      type: string
      default: |
        💥  Deployment:$ENV_NAME:
          stage: deployment
          extends: [.deployment]
          environment:
            name: $ENV_NAME

---
"$[[ inputs.job-name ]]":
  image: "$[[ inputs.job-image ]]"
  stage: "$[[ inputs.job-stage ]]"
  rules: "$[[ inputs.job-rules ]]"
  needs: "$[[ inputs.job-needs ]]"
  artifacts:
    when: always
    paths:
      - deployment.yml
    expire_in: 1 week
  cache: {}
  resource_group: "$[[ inputs.job-resource-group ]]"
  variables:
    GITLAB_CI_COMPONENTS_PATH: dev.rachuna/pipelines/gitlab/components/bootstrap
    CONVENTIONAL_COMMITS_REGEXP: ^(build|chore|ci|docs|feat|fix|perf|refactor|style|test|revert|merge|release|hotfix|fixup|squash|wip|BREAKING CHANGE)(\([a-zA-Z0-9_-]+\))?!?:\s.+$
    GITLAB_CI_COMPONENTS_VERSION: "$[[ component.reference ]]"
    DOCS_MD_FILE_PATH: templates/$[[ component.name ]]/README.md
  extends:
    - .before_script
    - .after_script
  before_script:
    - !reference [.before_script, before_script]
    - |
      check_var "CONVENTIONAL_COMMITS_REGEXP"
    - $[[ inputs.job-before-script ]]
    - |
      h2 "Pobieranie listy environments (pomijając stopped)..."
      glab api "projects/${CI_PROJECT_ID}/environments" | jq -r '.[] | select(.state != "stopped") | .name' > envs-list
    - |
      cat > deployment.yml <<EOF
      ---
      include:
      - project: $GITLAB_CI_REPOSITORY_PATH
        file: .gitlab-ci.yml
        ref: $GITLAB_CI_REPOSITORY_BRANCH
      EOF
  script: |
    if [ ! -s envs-list ]; then
      h2 "Brak aktywnych środowisk do deployowania."
      cat >> deployment.yml <<EOF
    "No active deployment environments":
      stage: .pre
      script:
        - echo "Brak aktywnych środowisk do deployowania."
    EOF
    fi

    while read -r ENV_NAME; do
      cat >> deployment.yml <<EOF
    $[[ inputs.job-definitons-script ]]
    EOF
    done < envs-list
    cat deployment.yml
  after_script:
    - !reference [.after_script, after_script]
    - $[[ inputs.job-after-script ]]

"$[[ inputs.trigger-job-name ]]":
  stage: "$[[ inputs.trigger-job-stage ]]"
  rules: "$[[ inputs.trigger-job-rules ]]"
  needs:
    - job: "$[[ inputs.job-name ]]"
      artifacts: true
  resource_group: "$[[ inputs.trigger-job-resource-group ]]"
  trigger:
    include:
      - artifact: deployment.yml
        job: "$[[ inputs.job-name ]]"
    strategy: mirror
