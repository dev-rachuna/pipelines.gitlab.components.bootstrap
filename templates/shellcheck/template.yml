---
spec:
  description: "Waliduje skrypty powłoki za pomocą narzędzia ShellCheck."
  component: [name, version, reference]
  inputs:
    job-name:
      type: string
      default: shellcheck
      description: "Nazwa joba walidującego skrypty powłoki."
    job-stage:
      default: validate
      description: "Etap pipeline, na którym zostanie uruchomiony job."
      options: [".pre", "prepare", "validate", "dependency", "build", "deployment", "tests", "publish", ".post"]
    job-image:
      description: "Obraz kontenera używany do uruchomienia joba."
      type: string
      default: registry.gitlab.com/dev.rachuna/artifacts/containers/python:1.2.0
    job-rules:
      description: "Reguły określające, kiedy job zostanie dodany do pipeline."
      type: array
      default:
        - if: '$ENABLED_SHELLCHECK == "false"'
          when: never
        - when: on_success
    job-needs:
      description: "Lista jobów wymaganych przed uruchomieniem tego joba."
      type: array
      default: []
    job-resource-group:
      description: "Nazwa grupy zasobów ograniczającej równoległe wykonywanie joba."
      type: string
      default: "${CI_PIPELINE_ID}-${CI_JOB_NAME}"
    job-before-script:
      description: "Dodatkowy skrypt wykonywany przed walidacją Shellcheck."
      type: string
      default: ":"
    job-after-script:
      description: "Dodatkowy skrypt wykonywany po walidacji ShellCheck."
      type: string
      default: ":"

---
include:
  - local: templates/shellcheck/script.sh.yml

"$[[ inputs.job-name ]]":
  image: "$[[ inputs.job-image ]]"
  stage: "$[[ inputs.job-stage ]]"
  rules: "$[[ inputs.job-rules ]]"
  needs: "$[[ inputs.job-needs ]]"
  artifacts: {}
  cache: {}
  resource_group: "$[[ inputs.job-resource-group ]]"
  extends:
    - .before_script
    - .after_script
  variables:
    GITLAB_CI_COMPONENTS_PATH: dev.rachuna/pipelines/gitlab/components/bootstrap
    DOCS_MD_FILE_PATH: templates/shellcheck/README.md
    GITLAB_CI_COMPONENTS_VERSION: "$[[ component.reference ]]"
  before_script:
    - !reference [.before_script, before_script]
    - $[[ inputs.job-before-script ]]
  script: !reference [.bootstrap.shellcheck.script.sh]
  after_script:
    - !reference [.after_script, after_script]
    - $[[ inputs.job-after-script ]]
